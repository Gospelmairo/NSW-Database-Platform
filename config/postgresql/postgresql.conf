# ============================================================
# PostgreSQL Configuration – NSW Platform (Production)
# Tuned for: high-availability, high-volume transactions,
#            logical replication, and security hardening
# ============================================================

# ── Connections ──────────────────────────────────────────────
max_connections           = 500
superuser_reserved_connections = 5

# ── Memory ───────────────────────────────────────────────────
# Rule of thumb: shared_buffers = 25% RAM (adjust to server)
shared_buffers            = 8GB
effective_cache_size      = 24GB
work_mem                  = 64MB          # per sort / hash op
maintenance_work_mem      = 2GB           # VACUUM, index builds
huge_pages                = try

# ── Write-Ahead Log (WAL) ─────────────────────────────────────
wal_level                 = logical       # required for replication
max_wal_size              = 4GB
min_wal_size              = 512MB
wal_compression           = on
wal_buffers               = 64MB
checkpoint_completion_target = 0.9
synchronous_commit        = remote_apply  # zero data-loss replication

# ── Replication ───────────────────────────────────────────────
max_replication_slots     = 20
max_wal_senders           = 20
wal_keep_size             = 2GB
hot_standby               = on
hot_standby_feedback      = on
recovery_min_apply_delay  = 0             # set >0 on delayed replica

# ── Query Planner ─────────────────────────────────────────────
random_page_cost          = 1.1           # SSD storage
effective_io_concurrency  = 200
default_statistics_target = 500           # better query plans

# ── Parallel Query ────────────────────────────────────────────
max_worker_processes      = 16
max_parallel_workers      = 8
max_parallel_workers_per_gather = 4
parallel_leader_participation = on

# ── Autovacuum (critical for high-volume tables) ──────────────
autovacuum                = on
autovacuum_max_workers    = 6
autovacuum_naptime        = 15s
autovacuum_vacuum_scale_factor  = 0.01    # 1% dead tuples → vacuum
autovacuum_analyze_scale_factor = 0.005
autovacuum_vacuum_cost_delay    = 2ms

# ── Logging ───────────────────────────────────────────────────
logging_collector         = on
log_directory             = '/var/log/postgresql'
log_filename              = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_size         = 100MB
log_rotation_age          = 1d
log_min_duration_statement = 1000        # log queries > 1 second
log_checkpoints           = on
log_connections           = on
log_disconnections        = on
log_lock_waits            = on
log_temp_files            = 0
log_line_prefix           = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '

# ── Security ──────────────────────────────────────────────────
ssl                       = on
ssl_cert_file             = '/etc/ssl/nsw/server.crt'
ssl_key_file              = '/etc/ssl/nsw/server.key'
ssl_ca_file               = '/etc/ssl/nsw/ca.crt'
ssl_min_protocol_version  = 'TLSv1.2'
ssl_ciphers               = 'HIGH:!aNULL'
password_encryption       = scram-sha-256
row_security              = on

# ── Extensions / Modules ──────────────────────────────────────
shared_preload_libraries  = 'pg_stat_statements,pg_partman,pgaudit'
pg_stat_statements.track  = all
pgaudit.log               = 'write,ddl,role,connection'
pgaudit.log_catalog       = on
pgaudit.log_relation      = on

# ── Connection Pooling hint (use PgBouncer externally) ────────
