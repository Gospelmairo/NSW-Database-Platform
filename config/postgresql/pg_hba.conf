# ============================================================
# pg_hba.conf – NSW Platform Host-Based Authentication
# Principle: deny all, then allow by role + IP range + method
# ============================================================

# TYPE  DATABASE        USER                ADDRESS                 METHOD

# ── Superuser: local socket only ─────────────────────────────
local   all             postgres                                    peer

# ── Replication: dedicated replication user + certificate auth
hostssl replication     repl_user           10.0.0.0/8              scram-sha-256
hostssl replication     repl_user           172.16.0.0/12           scram-sha-256

# ── Application service accounts (internal subnet, TLS required)
hostssl nsw_platform    app_user            10.10.0.0/16            scram-sha-256
hostssl nsw_platform    api_gateway         10.10.0.0/16            scram-sha-256
hostssl nsw_platform    etl_user            10.10.1.0/24            scram-sha-256

# ── Agency read-only accounts (each agency on its own VLAN)
hostssl nsw_platform    customs_ro          10.20.1.0/24            scram-sha-256
hostssl nsw_platform    ports_ro            10.20.2.0/24            scram-sha-256
hostssl nsw_platform    nafdac_ro           10.20.3.0/24            scram-sha-256
hostssl nsw_platform    son_ro              10.20.4.0/24            scram-sha-256

# ── DBA team: VPN range only, certificate required
hostssl all             dba_team            10.50.0.0/24            cert

# ── Monitoring: read-only pg_monitor role
hostssl nsw_platform    monitoring_user     10.10.2.5/32            scram-sha-256

# ── Reject everything else ────────────────────────────────────
host    all             all                 0.0.0.0/0               reject
host    all             all                 ::/0                    reject
